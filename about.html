<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我 · Moon's World</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0e1a;
      font-family: 'Cinzel', serif;
      overflow-x: hidden;
      color: #fff;
    }

    /* ===== 背景粒子画布 ===== */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ===== 背景渐变 ===== */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(120,80,200,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,180,60,0.1) 0%, transparent 50%),
        linear-gradient(160deg, #080c18 0%, #0f1628 50%, #080c18 100%);
    }

    /* ===== 返回按钮 ===== */
    #back-btn {
      position: fixed; top: 1.5rem; left: 1.5rem; z-index: 100;
      background: rgba(255,220,120,0.08);
      border: 1px solid rgba(255,220,120,0.3);
      color: rgba(255,220,120,0.8);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; letter-spacing: 0.2em;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    #back-btn:hover {
      background: rgba(255,220,120,0.15);
      border-color: rgba(255,220,120,0.6);
      color: rgba(255,220,120,1);
      box-shadow: 0 0 15px rgba(255,200,80,0.2);
    }

    /* ===== 主容器 ===== */
    .main-container {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 5rem 2rem 3rem;
    }

    .content-card {
      max-width: 1000px; width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    /* ===== 左侧：照片轮播 ===== */
    .photo-section {
      position: relative;
    }

    .carousel {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,220,120,0.2),
        0 0 30px rgba(255,200,80,0.1),
        0 20px 60px rgba(0,0,0,0.5);
    }

    .carousel-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .carousel-img.active { opacity: 1; }

    /* 轮播光晕边框 */
    .carousel::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg,
        rgba(255,220,120,0.1) 0%,
        transparent 40%,
        transparent 60%,
        rgba(180,120,255,0.1) 100%);
      z-index: 2; pointer-events: none;
    }

    /* 左右箭头 */
    .carousel-btn {
      position: absolute; top: 50%; z-index: 3;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,220,120,0.3);
      color: rgba(255,220,120,0.8);
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .carousel-btn:hover {
      background: rgba(255,220,120,0.15);
      border-color: rgba(255,220,120,0.7);
      color: #fff;
    }
    .carousel-btn.prev { left: 0.8rem; }
    .carousel-btn.next { right: 0.8rem; }

    /* 小圆点 */
    .carousel-dots {
      position: absolute; bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 3;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,220,120,0.3);
      cursor: pointer; transition: all 0.3s;
      border: 1px solid rgba(255,220,120,0.4);
    }
    .dot.active {
      background: rgba(255,220,120,0.9);
      box-shadow: 0 0 8px rgba(255,200,80,0.6);
      width: 18px; border-radius: 3px;
    }

    /* ===== 右侧：个人信息 ===== */
    .info-section {
      display: flex; flex-direction: column; gap: 1.8rem;
    }

    /* 标题 */
    .page-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.7rem;
      color: rgba(255,220,120,0.6);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .name-zh {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,220,120,0.4),
        0 0 40px rgba(255,200,80,0.2);
      line-height: 1.2;
    }

    .name-en {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: rgba(255,220,120,0.7);
      letter-spacing: 0.3em;
      margin-top: 0.3rem;
    }

    /* 分割线 */
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, rgba(255,220,120,0.8), transparent);
    }

    /* 标签组 */
    .tags {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
    }
    .tag {
      padding: 0.3rem 0.9rem;
      border: 1px solid rgba(255,220,120,0.25);
      border-radius: 30px;
      font-size: 0.72rem;
      color: rgba(255,220,120,0.8);
      letter-spacing: 0.1em;
      background: rgba(255,220,120,0.05);
      font-family: sans-serif;
    }

    /* 信息列表 */
    .info-list {
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .info-item {
      display: flex; align-items: flex-start; gap: 1rem;
    }
    .info-icon {
      font-size: 1rem; width: 20px;
      flex-shrink: 0; margin-top: 2px;
    }
    .info-text {
      font-family: sans-serif;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
    }
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: rgba(255,220,120,0.5);
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 2px;
    }

    /* 爱好标签 */
    .hobby-tags {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }
    .hobby-tag {
      padding: 0.25rem 0.8rem;
      background: rgba(180,120,255,0.08);
      border: 1px solid rgba(180,120,255,0.2);
      border-radius: 20px;
      font-size: 0.75rem;
      color: rgba(200,160,255,0.8);
      font-family: sans-serif;
    }

    /* ===== 过渡 ===== */
    #transition-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: #fff; opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #transition-overlay.active { opacity: 1; pointer-events: all; }

    /* ===== 页面淡入 ===== */
    .main-container {
      animation: pageIn 0.8s ease forwards;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <canvas id="bg-canvas"></canvas>

  <a id="back-btn" href="main.html">← 返回</a>

  <div class="main-container">
    <div class="content-card">

      <!-- 左：照片轮播 -->
      <div class="photo-section">
        <div class="carousel" id="carousel">
          <img class="carousel-img active" src="素材/关于我1.jfif" alt="photo 1">
          <img class="carousel-img" src="素材/关于我2.jfif" alt="photo 2">
          <img class="carousel-img" src="素材/关于我3.jfif" alt="photo 3">
          <img class="carousel-img" src="素材/关于我4.jfif" alt="photo 4">
          <img class="carousel-img" src="素材/关于我5.jfif" alt="photo 5">
          <button class="carousel-btn prev" id="prevBtn">‹</button>
          <button class="carousel-btn next" id="nextBtn">›</button>
          <div class="carousel-dots" id="dots"></div>
        </div>
      </div>

      <!-- 右：个人信息 -->
      <div class="info-section">
        <div>
          <p class="page-title">About Me</p>
          <h1 class="name-zh">魏越</h1>
          <p class="name-en">Wendy · 月亮</p>
        </div>

        <div class="divider"></div>

        <div class="tags">
          <span class="tag">2000年生</span>
          <span class="tag">处女座 ♍</span>
          <span class="tag">I??J</span>
        </div>

        <div class="info-list">
          <div class="info-item">
            <span class="info-icon">🎓</span>
            <div class="info-text">
              <span class="info-label">EDUCATION</span>
              四川农业大学
            </div>
          </div>
          <div class="info-item">
            <span class="info-icon">🌍</span>
            <div class="info-text">
              <span class="info-label">HOBBIES</span>
              <div class="hobby-tags">
                <span class="hobby-tag">📚 学习</span>
                <span class="hobby-tag">🎮 游戏</span>
                <span class="hobby-tag">✂️ 手工</span>
                <span class="hobby-tag">✈️ 旅游</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="transition-overlay"></div>

  <script>
    // ===== 轮播 =====
    const imgs = document.querySelectorAll('.carousel-img');
    const dotsContainer = document.getElementById('dots');
    let current = 0;
    let timer;

    // 生成圆点
    imgs.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(index) {
      imgs[current].classList.remove('active');
      document.querySelectorAll('.dot')[current].classList.remove('active');
      current = (index + imgs.length) % imgs.length;
      imgs[current].classList.add('active');
      document.querySelectorAll('.dot')[current].classList.add('active');
      resetTimer();
    }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 4000);
    }

    document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
    resetTimer();

    // ===== 返回过渡 =====
    const overlay = document.getElementById('transition-overlay');
    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => window.location.href = 'main.html', 600);
    });

    // ===== 背景粒子 =====
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = Array.from({length: 50}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.3,
      speedY: -(Math.random() * 0.3 + 0.1),
      opacity: Math.random() * 0.5 + 0.2,
      opacityDir: Math.random() > 0.5 ? 1 : -1,
    }));

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.y += p.speedY;
        p.opacity += p.opacityDir * 0.004;
        if (p.opacity > 0.7) p.opacityDir = -1;
        if (p.opacity < 0.1) p.opacityDir = 1;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,120,${p.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(255,200,80,0.6)';
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
