<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的技能 · Moon's World</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0e1a;
      font-family: 'Cinzel', serif;
      color: #fff;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* 背景 */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(100,80,200,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 60%, rgba(255,180,60,0.08) 0%, transparent 50%),
        linear-gradient(160deg, #080c18 0%, #0f1628 50%, #080c18 100%);
    }
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* 返回按钮 */
    #back-btn {
      position: fixed; top: 1.5rem; left: 1.5rem; z-index: 100;
      background: rgba(255,220,120,0.08);
      border: 1px solid rgba(255,220,120,0.3);
      color: rgba(255,220,120,0.8);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; letter-spacing: 0.2em;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    #back-btn:hover {
      background: rgba(255,220,120,0.15);
      border-color: rgba(255,220,120,0.6);
      color: #fff;
      box-shadow: 0 0 15px rgba(255,200,80,0.2);
    }

    /* 主面板 */
    .panel {
      position: relative; z-index: 1;
      background: rgba(10, 15, 35, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,220,120,0.2);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      max-width: 700px; width: 90%;
      box-shadow:
        0 0 0 1px rgba(255,220,120,0.05),
        0 0 40px rgba(255,200,80,0.08),
        0 20px 60px rgba(0,0,0,0.5);
      animation: panelIn 0.8s ease forwards;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 面板顶部光边 */
    .panel::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,220,120,0.5), transparent);
    }

    /* 标题 */
    .panel-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .panel-subtitle {
      font-size: 0.65rem;
      color: rgba(255,220,120,0.4);
      letter-spacing: 0.4em;
      margin-bottom: 0.6rem;
    }
    .panel-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.6rem;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,220,120,0.3);
    }
    .panel-divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,220,120,0.5), transparent);
      margin: 0.8rem auto 0;
    }

    /* 分类标题 */
    .category-title {
      font-size: 0.68rem;
      color: rgba(255,220,120,0.55);
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      margin-top: 1.5rem;
      display: flex; align-items: center; gap: 0.8rem;
    }
    .category-title::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,220,120,0.2), transparent);
    }

    /* 图标网格 */
    .icon-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    /* 图标卡片 */
    .icon-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.5rem;
      padding: 0.9rem 0.8rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      width: 80px;
      cursor: default;
      transition: all 0.25s ease;
      text-decoration: none;
    }
    .icon-card:hover {
      background: rgba(255,220,120,0.06);
      border-color: rgba(255,220,120,0.25);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 12px rgba(255,200,80,0.08);
    }
    .icon-card.clickable {
      cursor: pointer;
    }
    .icon-card.clickable:hover {
      border-color: rgba(255,220,120,0.4);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 15px rgba(255,200,80,0.15);
    }

    /* 图标图片 */
    .icon-img {
      width: 36px; height: 36px;
      object-fit: contain;
      border-radius: 8px;
    }

    /* 图标emoji备用 */
    .icon-emoji {
      font-size: 2rem;
      line-height: 1;
    }

    /* 图标名称 */
    .icon-name {
      font-family: sans-serif;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.55);
      text-align: center;
      white-space: nowrap;
    }
    .icon-card.clickable .icon-name {
      color: rgba(255,220,120,0.7);
    }

    /* 跳转提示 */
    .link-hint {
      font-size: 0.55rem;
      color: rgba(255,220,120,0.4);
      letter-spacing: 0.05em;
    }

    /* 过渡 */
    #transition-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: #fff; opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #transition-overlay.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <canvas id="bg-canvas"></canvas>
  <a id="back-btn" href="main.html">← 返回</a>

  <!-- 主面板 -->
  <div class="panel">

    <div class="panel-header">
      <p class="panel-subtitle">My Skills</p>
      <h1 class="panel-title">我的技能</h1>
      <div class="panel-divider"></div>
    </div>

    <!-- AI工具 -->
    <p class="category-title">AI 工具</p>
    <div class="icon-grid">

      <div class="icon-card">
        <span class="icon-emoji">🖱️</span>
        <span class="icon-name">Cursor</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">🤖</span>
        <span class="icon-name">Trae</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">💬</span>
        <span class="icon-name">ChatGPT</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">✨</span>
        <span class="icon-name">Claude</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">💻</span>
        <span class="icon-name">VSCode</span>
      </div>

    </div>

    <!-- 办公软件 -->
    <p class="category-title">办公软件</p>
    <div class="icon-grid">

      <div class="icon-card">
        <span class="icon-emoji">📝</span>
        <span class="icon-name">Word</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">📊</span>
        <span class="icon-name">Excel</span>
      </div>

      <div class="icon-card">
        <span class="icon-emoji">📑</span>
        <span class="icon-name">PowerPoint</span>
      </div>

      <!-- 飞书：点击跳转 -->
      <a class="icon-card clickable"
         href="https://dcn5einvu7ur.feishu.cn/wiki/ZHuiwL831ifnJkk8Tv0cwauinWc?from=from_copylink"
         target="_blank">
        <span class="icon-emoji">📚</span>
        <span class="icon-name">飞书笔记</span>
        <span class="link-hint">↗ 查看</span>
      </a>

    </div>

    <!-- 其他 -->
    <p class="category-title">其他</p>
    <div class="icon-grid">

      <!-- 抖音：点击跳转 -->
      <a class="icon-card clickable"
         href="https://v.douyin.com/CRWipx3vCgE/"
         target="_blank">
        <span class="icon-emoji">🎵</span>
        <span class="icon-name">抖音</span>
        <span class="link-hint">↗ 主页</span>
      </a>

    </div>

  </div>

  <div id="transition-overlay"></div>

  <script>
    // 返回
    const overlay = document.getElementById('transition-overlay');
    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => window.location.href = 'main.html', 600);
    });

    // 粒子
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = Array.from({length: 50}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.3,
      speedY: -(Math.random() * 0.3 + 0.1),
      opacity: Math.random() * 0.5 + 0.2,
      opacityDir: Math.random() > 0.5 ? 1 : -1,
    }));
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.y += p.speedY;
        p.opacity += p.opacityDir * 0.004;
        if (p.opacity > 0.7) p.opacityDir = -1;
        if (p.opacity < 0.1) p.opacityDir = 1;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,120,${p.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(255,200,80,0.6)';
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
