<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的作品 · Moon's World</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100%;
      background: #0a0e1a;
      font-family: 'Cinzel', serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* 背景 */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 30%, rgba(80,120,200,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 90% 70%, rgba(255,180,60,0.08) 0%, transparent 50%),
        linear-gradient(160deg, #080c18 0%, #0f1628 50%, #080c18 100%);
    }

    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* 返回按钮 */
    #back-btn {
      position: fixed; top: 1.5rem; left: 1.5rem; z-index: 100;
      background: rgba(255,220,120,0.08);
      border: 1px solid rgba(255,220,120,0.3);
      color: rgba(255,220,120,0.8);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem; letter-spacing: 0.2em;
      padding: 0.5rem 1.2rem; border-radius: 30px;
      cursor: pointer; text-decoration: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
    }
    #back-btn:hover {
      background: rgba(255,220,120,0.15);
      border-color: rgba(255,220,120,0.6);
      color: #fff;
      box-shadow: 0 0 15px rgba(255,200,80,0.2);
    }

    /* 主容器 */
    .main-container {
      position: relative; z-index: 1;
      padding: 5rem 2rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
      animation: pageIn 0.8s ease forwards;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 页面标题 */
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .page-subtitle {
      font-size: 0.7rem;
      color: rgba(255,220,120,0.5);
      letter-spacing: 0.4em;
      margin-bottom: 0.8rem;
    }
    .page-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: #fff;
      text-shadow: 0 0 20px rgba(255,220,120,0.3);
      margin-bottom: 0.8rem;
    }
    .page-divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,220,120,0.6), transparent);
      margin: 0 auto;
    }

    /* 分类标题 */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      color: rgba(255,220,120,0.7);
      letter-spacing: 0.3em;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .section-title::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,220,120,0.3), transparent);
    }

    /* ===== 手工作品网格 ===== */
    .craft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 3rem;
    }

    .craft-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,220,120,0.1);
      transition: all 0.3s ease;
    }
    .craft-card:hover {
      border-color: rgba(255,220,120,0.4);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(255,200,80,0.1);
    }
    .craft-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .craft-card:hover img { transform: scale(1.05); }

    .craft-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s;
    }
    .craft-card:hover .craft-card-overlay { opacity: 1; }

    /* ===== 插件卡片 ===== */
    .plugin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .plugin-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,220,120,0.15);
      border-radius: 16px;
      padding: 1.8rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .plugin-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,220,120,0.4), transparent);
    }
    .plugin-card:hover {
      border-color: rgba(255,220,120,0.35);
      background: rgba(255,220,120,0.04);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 20px rgba(255,200,80,0.08);
    }

    .plugin-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .plugin-name {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: rgba(255,220,120,0.9);
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
    }
    .plugin-desc {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 1.3rem;
    }
    .plugin-tag {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      background: rgba(100,150,255,0.1);
      border: 1px solid rgba(100,150,255,0.2);
      border-radius: 20px;
      font-size: 0.68rem;
      color: rgba(150,180,255,0.8);
      font-family: sans-serif;
      margin-right: 0.4rem;
      margin-bottom: 0.8rem;
    }
    .download-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      background: rgba(255,220,120,0.08);
      border: 1px solid rgba(255,220,120,0.3);
      border-radius: 20px;
      color: rgba(255,220,120,0.8);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .download-btn:hover {
      background: rgba(255,220,120,0.15);
      border-color: rgba(255,220,120,0.6);
      color: #fff;
    }

    /* ===== 持续更新 ===== */
    .updating-badge {
      text-align: center;
      padding: 2rem;
      border: 1px dashed rgba(255,220,120,0.2);
      border-radius: 12px;
      margin-top: 1rem;
    }
    .updating-badge p {
      font-family: sans-serif;
      font-size: 0.82rem;
      color: rgba(255,220,120,0.5);
      letter-spacing: 0.2em;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* 灯箱 */
    #lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 85vw; max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    #lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: rgba(255,220,120,0.1);
      border: 1px solid rgba(255,220,120,0.3);
      color: rgba(255,220,120,0.8);
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* 过渡 */
    #transition-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: #fff; opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #transition-overlay.active { opacity: 1; pointer-events: all; }

    /* ===== 小屏适配 ===== */
    @media (max-width: 600px) {
      .main-container { padding: 4.5rem 1.1rem 3rem; }
      .craft-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
      .plugin-grid { grid-template-columns: 1fr; gap: 1.2rem; }
      .plugin-card { padding: 1.4rem; }
      .page-header { margin-bottom: 2rem; }
      #back-btn { top: 1rem; left: 1rem; }
      #lightbox img { max-width: 92vw; max-height: 80vh; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>
  <canvas id="bg-canvas"></canvas>
  <a id="back-btn" href="main.html">← 返回</a>

  <div class="main-container">

    <!-- 页面标题 -->
    <div class="page-header">
      <p class="page-subtitle">My Works</p>
      <h1 class="page-title">我的作品</h1>
      <div class="page-divider"></div>
    </div>

    <!-- 钩织作品 -->
    <p class="section-title">🧶 钩织</p>
    <div class="craft-grid">
      <div class="craft-card" onclick="openLightbox('素材/钩织1.jfif')">
        <img src="素材/钩织1.jfif" alt="钩织1">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/钩织2.jfif')">
        <img src="素材/钩织2.jfif" alt="钩织2">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/钩织3.jfif')">
        <img src="素材/钩织3.jfif" alt="钩织3">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/钩织4.jfif')">
        <img src="素材/钩织4.jfif" alt="钩织4">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/钩织5.jfif')">
        <img src="素材/钩织5.jfif" alt="钩织5">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/钩织6.jfif')">
        <img src="素材/钩织6.jfif" alt="钩织6">
        <div class="craft-card-overlay"></div>
      </div>
    </div>

    <!-- DIY作品 -->
    <p class="section-title">🏠 DIY</p>
    <div class="craft-grid">
      <div class="craft-card" onclick="openLightbox('素材/diy1.jfif')">
        <img src="素材/diy1.jfif" alt="diy1">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/diy2.jfif')">
        <img src="素材/diy2.jfif" alt="diy2">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/diy3.jfif')">
        <img src="素材/diy3.jfif" alt="diy3">
        <div class="craft-card-overlay"></div>
      </div>
      <div class="craft-card" onclick="openLightbox('素材/diy4.jfif')">
        <img src="素材/diy4.jfif" alt="diy4">
        <div class="craft-card-overlay"></div>
      </div>
    </div>

    <!-- 插件 -->
    <p class="section-title">🔌 插件</p>
    <div class="plugin-grid">

      <div class="plugin-card">
        <div class="plugin-icon">🚗</div>
        <div class="plugin-name">模拟小爱同学车载平台</div>
        <div>
          <span class="plugin-tag">Chrome插件</span>
          <span class="plugin-tag">AI评测</span>
        </div>
        <p class="plugin-desc">
          模拟小爱同学车载系统的交互界面，用于评测车载AI助手的功能表现与用户体验。
        </p>
        <a class="download-btn" href="xiaoai模拟车载平台.zip" download>
          ↓ 下载插件
        </a>
      </div>

      <div class="plugin-card">
        <div class="plugin-icon">🔍</div>
        <div class="plugin-name">差异对比 · 高亮显示</div>
        <div>
          <span class="plugin-tag">Chrome插件</span>
          <span class="plugin-tag">文本对比</span>
        </div>
        <p class="plugin-desc">
          自动检测两条相似文本之间的差异，并将不同部分高亮显示，提升文本比对效率。
        </p>
        <a class="download-btn" href="差异对比-高亮显示.zip" download>
          ↓ 下载插件
        </a>
      </div>

    </div>

    <!-- 持续更新 -->
    <div class="updating-badge">
      <p>✨ 持续更新中 · Continuously Updating ✨</p>
    </div>

  </div>

  <!-- 灯箱 -->
  <div id="lightbox">
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <div id="transition-overlay"></div>

  <script>
    // 灯箱
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    // 返回
    const overlay = document.getElementById('transition-overlay');
    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => window.location.href = 'main.html', 600);
    });

    // 粒子
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = Array.from({length: 50}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.3,
      speedY: -(Math.random() * 0.3 + 0.1),
      opacity: Math.random() * 0.5 + 0.2,
      opacityDir: Math.random() > 0.5 ? 1 : -1,
    }));
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.y += p.speedY;
        p.opacity += p.opacityDir * 0.004;
        if (p.opacity > 0.7) p.opacityDir = -1;
        if (p.opacity < 0.1) p.opacityDir = 1;
        if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,220,120,${p.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(255,200,80,0.6)';
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
